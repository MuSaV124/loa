<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LOSTARK 노드 추천 계산기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="panel hero">
      <div class="topline">
        <div>
          <h1>LOSTARK 노드 추천 계산기</h1>
          <p>v1.3.0: 현재 선택 노드 효과를 먼저 제거한 뒤, 후보 노드를 다시 적용해서 추천합니다.</p>
        </div>
        <span class="badge">수라 브레이커 기준</span>
      </div>
      <form id="searchForm" class="search">
        <input id="characterName" value="무사브" autocomplete="off" placeholder="캐릭터명 입력" />
        <button id="searchButton" type="submit">검색</button>
      </form>
      <div id="message" class="message hidden"></div>
    </section>

    <section id="characterCard" class="panel character hidden"></section>

    <section id="resultPanel" class="panel hidden">
      <h2>기준 스탯</h2>
      <p class="hint">API에서 불러온 값이 부족하면 직접 입력하세요. 현재 선택된 노드 효과가 포함된 최종값을 입력하면 됩니다.</p>
      <div id="statGrid" class="grid"></div>
      <div class="manualGrid">
        <label>최종 치명타 확률(%)<input id="critRate" type="number" step="0.01" value="120" /></label>
        <label>최종 치명타 피해(%)<input id="critDamage" type="number" step="0.01" value="200" /></label>
        <label>현재 진화형 피해(%)<input id="evolutionDamage" type="number" step="0.01" value="0" /></label>
        <label>기타 최종 피해 증가(%)<input id="finalDamage" type="number" step="0.01" value="0" /></label>
        <label>주력기 치명 보정(%)<input id="skillCritBonus" type="number" step="0.01" value="0" /></label>
        <label>계산 대상<input id="targetSkill" value="전체 딜" /></label>
      </div>
      <button id="recalcButton" class="wideButton" type="button">추천 다시 계산</button>
    </section>

    <section id="tierPanel" class="panel hidden">
      <h2>티어별 현재 선택</h2>
      <p class="hint">자동 분류가 틀리면 드롭다운에서 직접 바꾸면 됩니다. 뭉툭한 가시/입식 타격가는 진화 5티어로 고정했습니다.</p>
      <div id="tierGroups" class="tierGroups"></div>
    </section>

    <section id="recommendPanel" class="panel hidden">
      <h2>추천 결과</h2>
      <div class="resultLayout">
        <div>
          <h3>현재 기준</h3>
          <div id="currentScore" class="scoreBox"></div>
          <div id="baseInfo" class="baseInfo"></div>
        </div>
        <div>
          <h3>추천 TOP</h3>
          <div id="recommendList" class="recommendList"></div>
        </div>
      </div>
    </section>

    <section id="dbPanel" class="panel">
      <h2>DB 상태</h2>
      <div class="grid">
        <div class="cell"><b>진화 DB</b><span id="evolutionDbStatus">대기</span></div>
        <div class="cell"><b>깨달음 DB</b><span id="enlightenmentDbStatus">대기</span></div>
        <div class="cell"><b>도약 DB</b><span id="leapDbStatus">대기</span></div>
      </div>
    </section>
  </main>

  <div class="version">Version 1.3.0</div>
  <script type="module" src="/app.js"></script>
</body>
</html>
