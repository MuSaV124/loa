<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로스트아크 4티어/5티어 추천 계산기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>로스트아크 4티어/5티어 추천 계산기</h1>
      <p>캐릭터명을 입력하면 직업, 진화/깨달음/도약, 선택 트라이포드에서 계산용 효과를 자동 추출합니다.</p>
      <form id="searchForm" class="search">
        <input id="characterName" type="text" placeholder="캐릭터명 입력" autocomplete="off" />
        <button type="submit">검색</button>
      </form>
      <p class="hint">추출 항목: 진피 · 적주피 · 추피 · 치적 · 치피 · 공속 · 이속</p>
    </section>

    <section id="status" class="status hidden"></section>

    <section id="characterCard" class="card hidden">
      <div class="profile">
        <img id="characterImage" alt="캐릭터 이미지" />
        <div>
          <h2 id="characterTitle"></h2>
          <p id="characterMeta"></p>
        </div>
      </div>
    </section>

    <section id="recommendation" class="card hidden"></section>
    <section id="equipment" class="card hidden"></section>
    <section id="raw" class="card hidden"></section>
  <footer class="version">v3.0.0 minimal timeout fix</footer>
</main>
  <script src="/app.js"></script>
<div style="position:fixed;right:12px;bottom:10px;color:#9ca3af;font-size:12px;">Version 1.0.4</div>
</body>
</html>
